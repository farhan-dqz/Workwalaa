<!DOCTYPE html>
<html>
<head>
    <title>Contact Form Test</title>
</head>
<body>
    <h1>Contact Form Test</h1>
    
    <form id="testForm" onsubmit="handleSubmit(event)">
        <div>
            <label>I am a...</label>
            <select name="type" required>
                <option value="" disabled selected>Select an option</option>
                <option value="job_seeker">Job Seeker</option>
                <option value="employer">Employer</option>
                <option value="founder_investor">Founder / Investor</option>
            </select>
        </div>
        <div>
            <label>Name:</label>
            <input type="text" name="name" required>
        </div>
        <div>
            <label>Phone:</label>
            <input type="tel" name="phone" required>
        </div>
        <div>
            <label>Email:</label>
            <input type="email" name="email">
        </div>
        <div>
            <label>Message:</label>
            <textarea name="message" required></textarea>
        </div>
        <button type="submit">Submit</button>
    </form>
    
    <div id="result"></div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            const form = document.getElementById('testForm');
            const result = document.getElementById('result');
            
            // Your Google Apps Script URL
            const scriptURL = 'https://script.google.com/macros/s/AKfycbyLnYvo3G9ElALEHHyNfgMSo5eIxg_PFMiWCrkI3uOM_vRTzBB_BO1k66S1xyO84SAhUg/exec';
            
            result.innerHTML = "Submitting...";
            
            // Create hidden iframe to bypass CORS
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.name = 'hidden-iframe';
            iframe.onload = function() {
                result.innerHTML = "✅ Form submitted successfully! Check your Google Sheet.";
                form.reset();
                // Clean up iframe
                if (iframe && iframe.parentNode) {
                    iframe.parentNode.removeChild(iframe);
                }
            };
            
            iframe.onerror = function() {
                result.innerHTML = "❌ Error submitting form";
                // Clean up iframe if it exists in DOM
                if (iframe && iframe.parentNode) {
                    iframe.parentNode.removeChild(iframe);
                }
            };
            
            document.body.appendChild(iframe);
            
            // Submit the form using the iframe
            form.target = 'hidden-iframe';
            form.action = scriptURL;
            form.method = 'POST';
            form.submit();
        }
    </script>
</body>
</html>
